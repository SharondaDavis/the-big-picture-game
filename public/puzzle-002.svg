<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e4d5c"/>
      <stop offset="35%" stop-color="#0a3a4f"/>
      <stop offset="70%" stop-color="#072a40"/>
      <stop offset="100%" stop-color="#041a2c"/>
    </linearGradient>
    <linearGradient id="ray" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bfeee0" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#bfeee0" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="subBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd24a"/>
      <stop offset="100%" stop-color="#e09a1f"/>
    </linearGradient>
    <linearGradient id="sand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c4a52"/>
      <stop offset="100%" stop-color="#0d2e3a"/>
    </linearGradient>
    <radialGradient id="glimmer" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#d8fff2" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#d8fff2" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Water -->
  <rect width="400" height="400" fill="url(#sea)"/>

  <!-- Surface shimmer (top edge) -->
  <rect x="0" y="0" width="400" height="26" fill="url(#glimmer)"/>
  <path d="M0 12 Q 25 6 50 12 T 100 12 T 150 12 T 200 12 T 250 12 T 300 12 T 350 12 T 400 12" stroke="#bfeee0" stroke-width="2" fill="none" opacity="0.5"/>

  <!-- Light rays (top-left) -->
  <polygon points="30,0 78,0 150,400 60,400" fill="url(#ray)"/>
  <polygon points="120,0 150,0 250,400 190,400" fill="url(#ray)" opacity="0.7"/>

  <!-- Whale (top-right landmark) -->
  <g transform="translate(300 82)">
    <path d="M-62 6 C-48 -22 8 -30 40 -12 C56 -3 62 6 58 14 C48 30 -10 34 -40 24 C-52 20 -60 14 -62 6 Z" fill="#12384f"/>
    <path d="M56 8 C68 0 78 -6 84 -16 C86 -4 82 6 74 12 C82 14 88 20 90 28 C78 26 66 20 56 14 Z" fill="#12384f"/>
    <path d="M-62 6 C-48 -22 8 -30 40 -12 L38 -8 C6 -24 -44 -16 -58 8 Z" fill="#1d4a63"/>
    <circle cx="-44" cy="2" r="3" fill="#9fdcE8" opacity="0"/>
    <circle cx="-44" cy="2" r="2.6" fill="#a8e2ee"/>
    <path d="M-30 16 C-20 20 0 22 14 20" stroke="#0c2c40" stroke-width="1.6" fill="none" opacity="0.8"/>
    <!-- Spout bubbles -->
    <circle cx="-52" cy="-26" r="2.4" fill="#bfeee0" opacity="0.7"/>
    <circle cx="-47" cy="-36" r="3.2" fill="#bfeee0" opacity="0.55"/>
    <circle cx="-54" cy="-46" r="2" fill="#bfeee0" opacity="0.4"/>
  </g>

  <!-- School of fish (top-left/mid) -->
  <g fill="#7fd4c1">
    <path d="M60 138 l10 -5 v10 z"/><path d="M78 132 l10 -5 v10 z"/><path d="M78 146 l10 -5 v10 z"/>
    <path d="M96 126 l10 -5 v10 z"/><path d="M96 140 l10 -5 v10 z"/><path d="M96 154 l10 -5 v10 z"/>
    <path d="M114 134 l10 -5 v10 z"/><path d="M114 148 l10 -5 v10 z"/>
  </g>

  <!-- Jellyfish (top-left landmark) -->
  <g transform="translate(30 78)">
    <path d="M-14 0 a14 14 0 0 1 28 0 z" fill="#e8a0c8" opacity="0.85"/>
    <path d="M-14 0 a14 14 0 0 1 28 0" fill="none" stroke="#f4c6de" stroke-width="1.4"/>
    <path d="M-10 2 q-2 10 2 18 M-3 2 q2 12 -1 22 M4 2 q3 10 0 18 M10 2 q2 8 -2 16" stroke="#e8a0c8" stroke-width="1.6" fill="none" opacity="0.75"/>
  </g>

  <!-- Submarine (centre landmark, crosses middle cells) -->
  <g transform="translate(196 208)">
    <ellipse cx="0" cy="0" rx="64" ry="26" fill="url(#subBody)"/>
    <ellipse cx="0" cy="-4" rx="64" ry="22" fill="#ffe27a" opacity="0.35"/>
    <rect x="-18" y="-44" width="30" height="22" rx="7" fill="#e0a52a"/>
    <rect x="4" y="-58" width="4" height="16" fill="#c98d1b"/>
    <circle cx="10" cy="-58" r="3.4" fill="#8fe8d8"/>
    <circle cx="-30" cy="0" r="8" fill="#0d3245" stroke="#8fe8d8" stroke-width="2.4"/>
    <circle cx="0" cy="4" r="8" fill="#0d3245" stroke="#8fe8d8" stroke-width="2.4"/>
    <circle cx="30" cy="0" r="8" fill="#0d3245" stroke="#8fe8d8" stroke-width="2.4"/>
    <path d="M60 -8 L82 -18 L82 16 L58 8 Z" fill="#c98d1b"/>
    <circle cx="-70" cy="-8" r="3" fill="#bfeee0" opacity="0.6"/>
    <circle cx="-76" cy="-18" r="2.2" fill="#bfeee0" opacity="0.45"/>
  </g>

  <!-- Rising bubbles (mid-right) -->
  <g fill="none" stroke="#bfeee0" opacity="0.55">
    <circle cx="330" cy="180" r="4"/>
    <circle cx="342" cy="158" r="3"/>
    <circle cx="334" cy="136" r="2.2"/>
    <circle cx="345" cy="118" r="1.8"/>
  </g>

  <!-- Sea floor -->
  <path d="M0 322 Q 60 306 120 318 T 240 316 T 400 320 L400 400 L0 400 Z" fill="url(#sand)"/>

  <!-- Coral cluster (bottom-left) -->
  <g transform="translate(56 322)">
    <path d="M0 0 q-4 -18 -14 -24 M0 0 q0 -22 8 -30 M0 0 q6 -14 18 -18" stroke="#e2574c" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M34 6 q-2 -14 4 -22 M34 6 q6 -10 14 -12" stroke="#f2b544" stroke-width="3.4" fill="none" stroke-linecap="round"/>
  </g>
  <!-- Treasure chest (bottom-left landmark) -->
  <g transform="translate(120 352)">
    <rect x="-20" y="-4" width="40" height="22" rx="3" fill="#8a5a33"/>
    <path d="M-20 -4 a20 12 0 0 1 40 0 z" fill="#a06b3d"/>
    <rect x="-20" y="-4" width="40" height="5" fill="#5f3d22"/>
    <rect x="-4" y="-6" width="8" height="10" rx="1.5" fill="#ffd24a"/>
    <circle cx="0" cy="-1" r="1.6" fill="#8a5a33"/>
    <circle cx="-10" cy="-12" r="2.6" fill="#ffd24a"/>
    <circle cx="6" cy="-15" r="2" fill="#ffe27a"/>
    <circle cx="13" cy="-10" r="1.8" fill="#ffd24a"/>
  </g>
  <!-- Starfish -->
  <path transform="translate(172 372) scale(0.9)" d="M0 -10 L3 -3 L10 -2 L4.5 2.5 L6 10 L0 6 L-6 10 L-4.5 2.5 L-10 -2 L-3 -3 Z" fill="#f2955e"/>

  <!-- Shipwreck (bottom-right landmark) -->
  <g transform="translate(322 332) rotate(-8)">
    <path d="M-52 12 L52 12 L38 34 L-40 34 Z" fill="#274252"/>
    <path d="M-52 12 L52 12 L48 4 L-46 4 Z" fill="#31505f"/>
    <line x1="-8" y1="4" x2="-8" y2="-38" stroke="#31505f" stroke-width="4"/>
    <path d="M-8 -38 L26 -12 L-8 -12 Z" fill="#3a5c66" opacity="0.9"/>
    <path d="M-30 4 l-3 -14 M14 4 l4 -10" stroke="#31505f" stroke-width="2.4"/>
    <circle cx="20" cy="20" r="4" fill="#0d3245" stroke="#517684" stroke-width="1.6"/>
    <circle cx="-16" cy="22" r="4" fill="#0d3245" stroke="#517684" stroke-width="1.6"/>
  </g>
  <!-- Anchor (bottom-right accent) -->
  <g transform="translate(250 366)" stroke="#6e93a1" stroke-width="3" fill="none" stroke-linecap="round">
    <line x1="0" y1="-16" x2="0" y2="8"/>
    <path d="M-10 2 a10 10 0 0 0 20 0"/>
    <circle cx="0" cy="-20" r="3.6"/>
    <line x1="-7" y1="-12" x2="7" y2="-12"/>
  </g>

  <!-- Seaweed strands -->
  <g stroke="#2e8f6f" stroke-width="3.4" fill="none" stroke-linecap="round">
    <path d="M14 400 q6 -18 -2 -34 q-6 -14 4 -28"/>
    <path d="M382 400 q-8 -16 0 -32 q6 -14 -4 -26"/>
    <path d="M212 400 q6 -14 -2 -28"/>
  </g>
</svg>
