<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="eveSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#101c3a"/>
      <stop offset="55%" stop-color="#1c2f5e"/>
      <stop offset="100%" stop-color="#31518f"/>
    </linearGradient>
    <linearGradient id="pitch" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2e8f4e"/>
      <stop offset="100%" stop-color="#1d6636"/>
    </linearGradient>
    <linearGradient id="cup" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e8b64a"/>
      <stop offset="50%" stop-color="#ffe08a"/>
      <stop offset="100%" stop-color="#c9942e"/>
    </linearGradient>
    <radialGradient id="floodGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff7d8" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#fff7d8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="standA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22345f"/>
      <stop offset="100%" stop-color="#182648"/>
    </linearGradient>
  </defs>

  <!-- Evening sky -->
  <rect width="400" height="400" fill="url(#eveSky)"/>

  <!-- Stars sparse -->
  <g fill="#dce8ff">
    <circle cx="30" cy="24" r="1.2"/><circle cx="120" cy="16" r="1"/><circle cx="205" cy="26" r="1.1"/>
    <circle cx="292" cy="14" r="1"/><circle cx="372" cy="30" r="1.3"/><circle cx="66" cy="46" r="1"/>
  </g>

  <!-- Floodlight towers (top-left and top-right landmarks) -->
  <g>
    <circle cx="52" cy="66" r="42" fill="url(#floodGlow)"/>
    <rect x="30" y="52" width="44" height="14" rx="3" fill="#101a33"/>
    <g fill="#fff7d8">
      <circle cx="38" cy="59" r="3.4"/><circle cx="52" cy="59" r="3.4"/><circle cx="66" cy="59" r="3.4"/>
    </g>
    <path d="M48 66 L42 120 M56 66 L62 120" stroke="#101a33" stroke-width="4"/>
  </g>
  <g>
    <circle cx="348" cy="66" r="42" fill="url(#floodGlow)"/>
    <rect x="326" y="52" width="44" height="14" rx="3" fill="#101a33"/>
    <g fill="#fff7d8">
      <circle cx="334" cy="59" r="3.4"/><circle cx="348" cy="59" r="3.4"/><circle cx="362" cy="59" r="3.4"/>
    </g>
    <path d="M344 66 L338 120 M352 66 L358 120" stroke="#101a33" stroke-width="4"/>
  </g>

  <!-- Fireworks between towers (top-centre landmark) -->
  <g stroke="#ffd66b" stroke-width="1.8" stroke-linecap="round">
    <line x1="200" y1="58" x2="200" y2="40"/><line x1="200" y1="58" x2="216" y2="46"/>
    <line x1="200" y1="58" x2="220" y2="62"/><line x1="200" y1="58" x2="212" y2="76"/>
    <line x1="200" y1="58" x2="188" y2="76"/><line x1="200" y1="58" x2="180" y2="62"/>
    <line x1="200" y1="58" x2="184" y2="46"/>
  </g>
  <g fill="#ffd66b">
    <circle cx="200" cy="35" r="1.8"/><circle cx="222" cy="44" r="1.6"/><circle cx="226" cy="64" r="1.6"/>
  </g>
  <g stroke="#7fd4c1" stroke-width="1.4" stroke-linecap="round">
    <line x1="146" y1="94" x2="146" y2="84"/><line x1="146" y1="94" x2="155" y2="88"/>
    <line x1="146" y1="94" x2="155" y2="100"/><line x1="146" y1="94" x2="137" y2="100"/>
    <line x1="146" y1="94" x2="137" y2="88"/>
  </g>
  <g stroke="#e86ba7" stroke-width="1.4" stroke-linecap="round">
    <line x1="258" y1="98" x2="258" y2="88"/><line x1="258" y1="98" x2="267" y2="92"/>
    <line x1="258" y1="98" x2="267" y2="104"/><line x1="258" y1="98" x2="249" y2="104"/>
    <line x1="258" y1="98" x2="249" y2="92"/>
  </g>

  <!-- Stadium stands: two tiers of crowd -->
  <path d="M0 132 Q 200 96 400 132 L400 208 L0 208 Z" fill="url(#standA)"/>
  <!-- Crowd dots, tifo colour bands -->
  <g>
    <g fill="#e2574c"><circle cx="18" cy="152" r="3"/><circle cx="34" cy="148" r="3"/><circle cx="50" cy="146" r="3"/><circle cx="66" cy="143" r="3"/><circle cx="26" cy="164" r="3"/><circle cx="42" cy="160" r="3"/><circle cx="58" cy="157" r="3"/></g>
    <g fill="#f6e3a8"><circle cx="82" cy="141" r="3"/><circle cx="98" cy="138" r="3"/><circle cx="114" cy="136" r="3"/><circle cx="90" cy="153" r="3"/><circle cx="106" cy="150" r="3"/><circle cx="74" cy="155" r="3"/></g>
    <g fill="#7fd4c1"><circle cx="130" cy="133" r="3"/><circle cx="146" cy="131" r="3"/><circle cx="162" cy="129" r="3"/><circle cx="138" cy="147" r="3"/><circle cx="154" cy="145" r="3"/></g>
    <g fill="#dce8ff"><circle cx="178" cy="128" r="3"/><circle cx="194" cy="127" r="3"/><circle cx="210" cy="127" r="3"/><circle cx="186" cy="142" r="3"/><circle cx="202" cy="141" r="3"/></g>
    <g fill="#e86ba7"><circle cx="226" cy="128" r="3"/><circle cx="242" cy="129" r="3"/><circle cx="258" cy="131" r="3"/><circle cx="234" cy="143" r="3"/><circle cx="250" cy="145" r="3"/></g>
    <g fill="#ffd66b"><circle cx="274" cy="133" r="3"/><circle cx="290" cy="136" r="3"/><circle cx="306" cy="138" r="3"/><circle cx="282" cy="148" r="3"/><circle cx="298" cy="151" r="3"/></g>
    <g fill="#8fa8ff"><circle cx="322" cy="141" r="3"/><circle cx="338" cy="144" r="3"/><circle cx="354" cy="147" r="3"/><circle cx="330" cy="156" r="3"/><circle cx="346" cy="160" r="3"/><circle cx="370" cy="151" r="3"/><circle cx="378" cy="163" r="3"/></g>
  </g>
  <!-- Scoreboard (right stand landmark) -->
  <g transform="translate(330 184)">
    <rect x="-34" y="-14" width="68" height="28" rx="4" fill="#0b1226" stroke="#3d5486" stroke-width="1.6"/>
    <text x="0" y="7" font-family="monospace" font-size="18" font-weight="bold" fill="#ffd66b" text-anchor="middle">2–1</text>
  </g>
  <!-- Stand banner (left landmark) -->
  <g transform="translate(64 190)">
    <rect x="-40" y="-9" width="80" height="18" rx="3" fill="#e2574c"/>
    <text x="0" y="5" font-family="sans-serif" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">OLÉ!</text>
  </g>

  <!-- Pitch -->
  <rect x="0" y="208" width="400" height="192" fill="url(#pitch)"/>
  <!-- Mow stripes -->
  <g fill="#37a35b" opacity="0.4">
    <rect x="0" y="232" width="400" height="24"/>
    <rect x="0" y="280" width="400" height="24"/>
    <rect x="0" y="328" width="400" height="24"/>
    <rect x="0" y="376" width="400" height="24"/>
  </g>
  <!-- Centre circle + halfway line -->
  <g stroke="#e8f5ec" stroke-width="2.4" fill="none" opacity="0.85">
    <line x1="0" y1="252" x2="400" y2="252"/>
    <circle cx="200" cy="252" r="34"/>
  </g>

  <!-- The cup on a plinth (dead centre landmark) -->
  <g transform="translate(200 300)">
    <ellipse cx="0" cy="46" rx="46" ry="8" fill="#0f3d20" opacity="0.6"/>
    <rect x="-26" y="30" width="52" height="14" rx="3" fill="#274252"/>
    <rect x="-20" y="24" width="40" height="8" rx="2" fill="#31505f"/>
    <path d="M-20 -46 L20 -46 C20 -20 12 -6 6 0 L-6 0 C-12 -6 -20 -20 -20 -46 Z" fill="url(#cup)"/>
    <path d="M-20 -42 C-34 -40 -36 -22 -18 -18 M20 -42 C34 -40 36 -22 18 -18" stroke="#e8b64a" stroke-width="5" fill="none"/>
    <rect x="-8" y="0" width="16" height="10" fill="#c9942e"/>
    <rect x="-14" y="10" width="28" height="14" rx="2" fill="url(#cup)"/>
    <path d="M-14 -40 L-6 -40 C-6 -24 -8 -14 -10 -8" stroke="#fff3c8" stroke-width="3" fill="none" opacity="0.7"/>
  </g>

  <!-- Football, classic panels (bottom-left landmark) -->
  <g transform="translate(84 344)">
    <circle cx="0" cy="0" r="26" fill="#f4f7f2"/>
    <circle cx="0" cy="0" r="26" fill="none" stroke="#c9d4c4" stroke-width="2"/>
    <path d="M0 -9 L9 -2 L5 8 L-5 8 L-9 -2 Z" fill="#1c2430"/>
    <path d="M0 -26 L0 -9 M9 -2 L24 -8 M5 8 L12 23 M-5 8 L-12 23 M-9 -2 L-24 -8" stroke="#1c2430" stroke-width="2.4"/>
    <path d="M-26 -6 a26 26 0 0 1 10 -15" stroke="#ffffff" stroke-width="3" fill="none" opacity="0.8"/>
  </g>

  <!-- Goal with net (bottom-right landmark) -->
  <g transform="translate(330 342)">
    <path d="M-44 22 L-44 -26 L44 -26 L44 22" stroke="#f4f7f2" stroke-width="4" fill="none"/>
    <path d="M-44 -26 L-30 -38 L58 -38 L44 -26 M58 -38 L58 8 L44 22" stroke="#dfe8e0" stroke-width="2.4" fill="none"/>
    <g stroke="#dfe8e0" stroke-width="0.8" opacity="0.7">
      <line x1="-30" y1="-26" x2="-30" y2="22"/><line x1="-16" y1="-26" x2="-16" y2="22"/>
      <line x1="-2" y1="-26" x2="-2" y2="22"/><line x1="12" y1="-26" x2="12" y2="22"/>
      <line x1="26" y1="-26" x2="26" y2="22"/>
      <line x1="-44" y1="-12" x2="44" y2="-12"/><line x1="-44" y1="2" x2="44" y2="2"/>
    </g>
  </g>

  <!-- Corner flag (bottom-left corner accent) -->
  <g transform="translate(16 376)">
    <line x1="0" y1="0" x2="0" y2="-34" stroke="#f4f7f2" stroke-width="2.6"/>
    <path d="M0 -34 L20 -28 L0 -22 Z" fill="#e2574c"/>
  </g>

  <!-- Confetti on the pitch -->
  <g>
    <rect x="150" y="368" width="6" height="3" rx="1" fill="#ffd66b" transform="rotate(24 153 369)"/>
    <rect x="238" y="372" width="6" height="3" rx="1" fill="#e86ba7" transform="rotate(-18 241 373)"/>
    <rect x="192" y="380" width="6" height="3" rx="1" fill="#7fd4c1" transform="rotate(40 195 381)"/>
    <rect x="130" y="300" width="6" height="3" rx="1" fill="#e2574c" transform="rotate(-30 133 301)"/>
    <rect x="262" y="296" width="6" height="3" rx="1" fill="#8fa8ff" transform="rotate(12 265 297)"/>
    <rect x="222" y="226" width="6" height="3" rx="1" fill="#ffd66b" transform="rotate(-42 225 227)"/>
    <rect x="168" y="232" width="6" height="3" rx="1" fill="#e86ba7" transform="rotate(30 171 233)"/>
  </g>
</svg>
