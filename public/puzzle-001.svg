<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#05040f"/>
      <stop offset="45%" stop-color="#0e0c2e"/>
      <stop offset="75%" stop-color="#2b1a4e"/>
      <stop offset="100%" stop-color="#4a2560"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1d1440"/>
      <stop offset="100%" stop-color="#0a0820"/>
    </linearGradient>
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe9b0" stop-opacity="0.9"/>
      <stop offset="55%" stop-color="#ffd98a" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffd98a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="flame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff3c4"/>
      <stop offset="45%" stop-color="#ffb347"/>
      <stop offset="100%" stop-color="#ff5c33" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="rocketBody" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d8dbe6"/>
      <stop offset="50%" stop-color="#f7f8fc"/>
      <stop offset="100%" stop-color="#aab0c4"/>
    </linearGradient>
    <linearGradient id="cityA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#191536"/>
      <stop offset="100%" stop-color="#100d26"/>
    </linearGradient>
    <linearGradient id="nebula" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7b3fa0" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#2d6cdf" stop-opacity="0.12"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="400" height="400" fill="url(#sky)"/>

  <!-- Nebula wisps (top-left) -->
  <ellipse cx="70" cy="55" rx="85" ry="30" fill="url(#nebula)" transform="rotate(-14 70 55)"/>
  <ellipse cx="130" cy="95" rx="60" ry="18" fill="url(#nebula)" transform="rotate(-8 130 95)" opacity="0.7"/>

  <!-- Stars: denser in the upper half, varied sizes -->
  <g fill="#ffffff">
    <circle cx="22" cy="26" r="1.6"/><circle cx="58" cy="14" r="1"/><circle cx="96" cy="38" r="1.3"/>
    <circle cx="140" cy="18" r="1"/><circle cx="171" cy="52" r="1.7"/><circle cx="205" cy="12" r="1.1"/>
    <circle cx="238" cy="42" r="1.4"/><circle cx="270" cy="20" r="1"/><circle cx="345" cy="52" r="1.2"/>
    <circle cx="381" cy="24" r="1.5"/><circle cx="34" cy="88" r="1.1"/><circle cx="88" cy="118" r="1.5"/>
    <circle cx="150" cy="98" r="1"/><circle cx="196" cy="132" r="1.2"/><circle cx="240" cy="88" r="1"/>
    <circle cx="373" cy="120" r="1.3"/><circle cx="17" cy="150" r="1.4"/><circle cx="60" cy="176" r="1"/>
    <circle cx="120" cy="158" r="1.2"/><circle cx="330" cy="165" r="1"/><circle cx="390" cy="150" r="1.1"/>
  </g>
  <!-- Twinkle crosses -->
  <g stroke="#fff" stroke-width="0.8" opacity="0.9">
    <path d="M52 60 v8 M48 64 h8"/>
    <path d="M300 30 v10 M295 35 h10"/>
    <path d="M105 75 v6 M102 78 h6"/>
  </g>

  <!-- Shooting star (top-right) -->
  <line x1="248" y1="62" x2="298" y2="44" stroke="#cfe4ff" stroke-width="1.6" stroke-linecap="round" opacity="0.85"/>
  <circle cx="298" cy="44" r="2.2" fill="#eaf4ff"/>

  <!-- Moon with craters (top-right quadrant) -->
  <circle cx="330" cy="88" r="58" fill="url(#moonGlow)"/>
  <circle cx="330" cy="88" r="34" fill="#f6e3a8"/>
  <circle cx="330" cy="88" r="34" fill="none" stroke="#e8cf8e" stroke-width="1.5"/>
  <circle cx="318" cy="76" r="6.5" fill="#e3c98b"/>
  <circle cx="342" cy="96" r="4.5" fill="#e3c98b"/>
  <circle cx="331" cy="104" r="3" fill="#dfc383"/>
  <circle cx="345" cy="74" r="2.6" fill="#dfc383"/>
  <path d="M304 96 a34 34 0 0 0 18 24" stroke="#fff6d8" stroke-width="2" fill="none" opacity="0.6"/>

  <!-- Satellite (top-left landmark) -->
  <g transform="translate(60 120) rotate(-18)">
    <rect x="-4" y="-3" width="8" height="6" rx="1" fill="#c7cede"/>
    <rect x="-16" y="-1.5" width="10" height="3" rx="0.5" fill="#3b6fd4"/>
    <rect x="6" y="-1.5" width="10" height="3" rx="0.5" fill="#3b6fd4"/>
    <line x1="0" y1="-3" x2="0" y2="-8" stroke="#c7cede" stroke-width="1"/>
    <circle cx="0" cy="-9" r="1.4" fill="#ff8a5c"/>
  </g>

  <!-- Hot air balloon (left-middle landmark) -->
  <g transform="translate(48 205)">
    <path d="M0 -26 c14 0 20 12 20 22 c0 12 -12 20 -20 26 c-8 -6 -20 -14 -20 -26 c0 -10 6 -22 20 -22z" fill="#e2574c"/>
    <path d="M0 -26 c5 0 8 12 8 22 c0 12 -4 20 -8 26 c-4 -6 -8 -14 -8 -26 c0 -10 3 -22 8 -22z" fill="#f2b544"/>
    <path d="M-7 22 l2 7 h10 l2 -7" stroke="#caa06a" stroke-width="1.2" fill="none"/>
    <rect x="-6" y="29" width="12" height="8" rx="1.5" fill="#8a5a33"/>
  </g>

  <!-- Rocket ascending centre, crossing the horizon -->
  <g transform="translate(200 178) rotate(3)">
    <path d="M0 -74 C14 -56 18 -30 18 -6 L18 34 L-18 34 L-18 -6 C-18 -30 -14 -56 0 -74 Z" fill="url(#rocketBody)"/>
    <path d="M0 -74 C6 -58 8 -34 8 -6 L8 34 L-8 34 L-8 -6 C-8 -34 -6 -58 0 -74 Z" fill="#ffffff" opacity="0.35"/>
    <path d="M0 -74 C-9 -62 -14 -48 -16 -34 L16 -34 C14 -48 9 -62 0 -74 Z" fill="#e2574c"/>
    <circle cx="0" cy="-14" r="11" fill="#274a8f"/>
    <circle cx="0" cy="-14" r="11" fill="none" stroke="#cdd4e4" stroke-width="2.6"/>
    <circle cx="-3.5" cy="-17.5" r="3.4" fill="#5f8fe8" opacity="0.9"/>
    <path d="M-18 10 L-34 40 L-18 34 Z" fill="#e2574c"/>
    <path d="M18 10 L34 40 L18 34 Z" fill="#c94b41"/>
    <rect x="-10" y="34" width="20" height="7" rx="2" fill="#8f96ab"/>
    <path d="M-9 41 C-9 58 -5 70 0 84 C5 70 9 58 9 41 Z" fill="url(#flame)"/>
    <path d="M-4.5 41 C-4.5 52 -2 60 0 68 C2 60 4.5 52 4.5 41 Z" fill="#fff3c4" opacity="0.9"/>
  </g>
  <!-- Smoke puffs -->
  <g fill="#b9b2d8" opacity="0.5">
    <circle cx="184" cy="266" r="9"/><circle cx="199" cy="276" r="12"/><circle cx="216" cy="268" r="8"/>
    <circle cx="176" cy="278" r="6"/><circle cx="226" cy="278" r="5.5"/>
  </g>

  <!-- Distant mountain ridge -->
  <path d="M0 258 L46 224 L88 252 L132 218 L168 250 L212 230 L258 254 L302 222 L344 250 L400 228 L400 292 L0 292 Z" fill="#241c48" opacity="0.85"/>

  <!-- City skyline band -->
  <g>
    <rect x="0" y="262" width="400" height="66" fill="url(#cityA)"/>
    <!-- Left cluster (bottom-left) -->
    <rect x="10" y="238" width="26" height="60" fill="#151132"/>
    <rect x="44" y="252" width="20" height="46" fill="#1a1540"/>
    <rect x="70" y="228" width="30" height="70" fill="#131029"/>
    <rect x="108" y="246" width="18" height="52" fill="#1a1540"/>
    <polygon points="70,228 85,208 100,228" fill="#131029"/>
    <line x1="85" y1="208" x2="85" y2="196" stroke="#8f96ab" stroke-width="1.6"/>
    <circle cx="85" cy="194" r="2" fill="#ff5c5c"/>
    <!-- Right cluster (bottom-right) -->
    <rect x="268" y="240" width="24" height="58" fill="#151132"/>
    <rect x="298" y="222" width="34" height="76" fill="#131029"/>
    <rect x="338" y="248" width="20" height="50" fill="#1a1540"/>
    <rect x="364" y="234" width="28" height="64" fill="#151132"/>
    <polygon points="298,222 315,204 332,222" fill="#131029"/>
    <!-- Dome landmark (bottom-right) -->
    <path d="M338 248 a14 14 0 0 1 28 0 z" fill="#241c48"/>
    <!-- Lit windows -->
    <g fill="#ffd98a">
      <rect x="15" y="244" width="4" height="5"/><rect x="24" y="256" width="4" height="5"/>
      <rect x="15" y="270" width="4" height="5" opacity="0.7"/><rect x="48" y="258" width="3.5" height="4.5"/>
      <rect x="56" y="272" width="3.5" height="4.5" opacity="0.8"/><rect x="76" y="238" width="4" height="5"/>
      <rect x="88" y="252" width="4" height="5" opacity="0.75"/><rect x="76" y="268" width="4" height="5"/>
      <rect x="112" y="252" width="3.5" height="4.5"/><rect x="112" y="268" width="3.5" height="4.5" opacity="0.7"/>
      <rect x="273" y="248" width="4" height="5"/><rect x="282" y="262" width="4" height="5" opacity="0.8"/>
      <rect x="305" y="230" width="4" height="5"/><rect x="318" y="244" width="4" height="5"/>
      <rect x="305" y="262" width="4" height="5" opacity="0.7"/><rect x="343" y="256" width="3.5" height="4.5"/>
      <rect x="370" y="242" width="4" height="5"/><rect x="380" y="258" width="4" height="5" opacity="0.8"/>
      <rect x="370" y="274" width="4" height="5"/>
    </g>
  </g>

  <!-- Water with reflections -->
  <rect x="0" y="328" width="400" height="72" fill="url(#water)"/>
  <g stroke-linecap="round">
    <line x1="20" y1="342" x2="52" y2="342" stroke="#ffd98a" stroke-width="2" opacity="0.35"/>
    <line x1="80" y1="356" x2="104" y2="356" stroke="#8f96ab" stroke-width="1.6" opacity="0.3"/>
    <line x1="180" y1="340" x2="222" y2="340" stroke="#ffb347" stroke-width="2.4" opacity="0.5"/>
    <line x1="188" y1="352" x2="214" y2="352" stroke="#ffb347" stroke-width="1.8" opacity="0.35"/>
    <line x1="192" y1="366" x2="209" y2="366" stroke="#ff8a5c" stroke-width="1.4" opacity="0.25"/>
    <line x1="300" y1="346" x2="340" y2="346" stroke="#f6e3a8" stroke-width="2" opacity="0.4"/>
    <line x1="312" y1="360" x2="332" y2="360" stroke="#f6e3a8" stroke-width="1.4" opacity="0.25"/>
    <line x1="40" y1="374" x2="66" y2="374" stroke="#8f96ab" stroke-width="1.4" opacity="0.2"/>
    <line x1="352" y1="378" x2="376" y2="378" stroke="#8f96ab" stroke-width="1.4" opacity="0.2"/>
  </g>

  <!-- Sailboat (bottom-left water landmark) -->
  <g transform="translate(92 350)">
    <path d="M-16 0 L16 0 L10 8 L-10 8 Z" fill="#2a2352"/>
    <line x1="0" y1="0" x2="0" y2="-24" stroke="#4a4370" stroke-width="1.6"/>
    <path d="M0 -24 L14 -3 L0 -3 Z" fill="#e8e4f4"/>
    <path d="M0 -20 L-10 -3 L0 -3 Z" fill="#cfc8e8"/>
  </g>

  <!-- Buoy light (bottom-right water landmark) -->
  <g transform="translate(330 372)">
    <path d="M-5 4 L5 4 L3 -4 L-3 -4 Z" fill="#3a3162"/>
    <circle cx="0" cy="-7" r="2.4" fill="#ff8a5c"/>
    <circle cx="0" cy="-7" r="5" fill="#ff8a5c" opacity="0.25"/>
  </g>
</svg>
