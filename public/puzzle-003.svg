<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="dusk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0f2e"/>
      <stop offset="45%" stop-color="#3d1a4a"/>
      <stop offset="75%" stop-color="#7a2d4e"/>
      <stop offset="100%" stop-color="#b4483f"/>
    </linearGradient>
    <linearGradient id="ground3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1230"/>
      <stop offset="100%" stop-color="#160a1c"/>
    </linearGradient>
    <radialGradient id="wheelGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffce54" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#ffce54" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tentA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e2574c"/>
      <stop offset="100%" stop-color="#b03c33"/>
    </linearGradient>
    <linearGradient id="tentB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6a4ccf"/>
      <stop offset="100%" stop-color="#4a339c"/>
    </linearGradient>
  </defs>

  <!-- Dusk sky -->
  <rect width="400" height="400" fill="url(#dusk)"/>

  <!-- Stars & crescent (top-left) -->
  <g fill="#ffe9c9">
    <circle cx="26" cy="30" r="1.5"/><circle cx="70" cy="16" r="1"/><circle cx="112" cy="42" r="1.2"/>
    <circle cx="150" cy="20" r="1"/><circle cx="52" cy="66" r="1.1"/><circle cx="94" cy="84" r="1"/>
    <circle cx="176" cy="60" r="1.3"/><circle cx="16" cy="104" r="1"/>
  </g>
  <path d="M60 44 a16 16 0 1 0 14 24 a13 13 0 1 1 -14 -24 z" fill="#ffe9c9" opacity="0.95"/>

  <!-- Fireworks (top-right quadrant) -->
  <g stroke-linecap="round">
    <g stroke="#ffce54" stroke-width="2">
      <line x1="300" y1="70" x2="300" y2="46"/><line x1="300" y1="70" x2="322" y2="56"/>
      <line x1="300" y1="70" x2="324" y2="76"/><line x1="300" y1="70" x2="312" y2="92"/>
      <line x1="300" y1="70" x2="288" y2="92"/><line x1="300" y1="70" x2="276" y2="76"/>
      <line x1="300" y1="70" x2="278" y2="56"/><line x1="300" y1="70" x2="300" y2="94"/>
    </g>
    <g fill="#ffce54">
      <circle cx="300" cy="40" r="2"/><circle cx="328" cy="52" r="1.8"/><circle cx="330" cy="78" r="1.8"/>
      <circle cx="316" cy="98" r="1.6"/><circle cx="284" cy="98" r="1.6"/><circle cx="270" cy="52" r="1.8"/>
    </g>
    <g stroke="#e86ba7" stroke-width="1.8">
      <line x1="362" y1="120" x2="362" y2="104"/><line x1="362" y1="120" x2="376" y2="110"/>
      <line x1="362" y1="120" x2="378" y2="126"/><line x1="362" y1="120" x2="368" y2="136"/>
      <line x1="362" y1="120" x2="352" y2="134"/><line x1="362" y1="120" x2="346" y2="112"/>
    </g>
    <g fill="#e86ba7">
      <circle cx="362" cy="99" r="1.6"/><circle cx="381" cy="107" r="1.4"/><circle cx="383" cy="129" r="1.4"/>
    </g>
    <g stroke="#7fd4c1" stroke-width="1.6">
      <line x1="244" y1="126" x2="244" y2="114"/><line x1="244" y1="126" x2="255" y2="119"/>
      <line x1="244" y1="126" x2="255" y2="133"/><line x1="244" y1="126" x2="244" y2="139"/>
      <line x1="244" y1="126" x2="233" y2="133"/><line x1="244" y1="126" x2="233" y2="119"/>
    </g>
  </g>

  <!-- Ferris wheel (left, spans TL into BL) -->
  <circle cx="108" cy="188" r="86" fill="url(#wheelGlow)"/>
  <g stroke="#d8a13e" stroke-width="3" fill="none">
    <circle cx="108" cy="188" r="62"/>
    <circle cx="108" cy="188" r="50" opacity="0.5" stroke-width="1.6"/>
    <line x1="108" y1="126" x2="108" y2="250"/>
    <line x1="46" y1="188" x2="170" y2="188"/>
    <line x1="64" y1="144" x2="152" y2="232"/>
    <line x1="152" y1="144" x2="64" y2="232"/>
  </g>
  <circle cx="108" cy="188" r="7" fill="#ffce54"/>
  <!-- Cabins -->
  <g>
    <rect x="101" y="118" width="14" height="12" rx="3" fill="#e2574c"/>
    <rect x="101" y="244" width="14" height="12" rx="3" fill="#7fd4c1"/>
    <rect x="39" y="182" width="14" height="12" rx="3" fill="#e86ba7"/>
    <rect x="163" y="182" width="14" height="12" rx="3" fill="#6a4ccf"/>
    <rect x="57" y="137" width="14" height="12" rx="3" fill="#ffce54"/>
    <rect x="145" y="137" width="14" height="12" rx="3" fill="#7fd4c1"/>
    <rect x="57" y="225" width="14" height="12" rx="3" fill="#6a4ccf"/>
    <rect x="145" y="225" width="14" height="12" rx="3" fill="#ffce54"/>
  </g>
  <!-- Support legs -->
  <path d="M108 250 L82 322 M108 250 L134 322" stroke="#a8762c" stroke-width="5" fill="none"/>

  <!-- Balloon bunch (mid-right landmark) -->
  <g transform="translate(322 208)">
    <line x1="0" y1="34" x2="-6" y2="4" stroke="#d8b48a" stroke-width="1.2"/>
    <line x1="0" y1="34" x2="4" y2="0" stroke="#d8b48a" stroke-width="1.2"/>
    <line x1="0" y1="34" x2="12" y2="8" stroke="#d8b48a" stroke-width="1.2"/>
    <ellipse cx="-8" cy="-6" rx="9" ry="11" fill="#e2574c"/>
    <ellipse cx="4" cy="-12" rx="9" ry="11" fill="#7fd4c1"/>
    <ellipse cx="14" cy="-2" rx="9" ry="11" fill="#ffce54"/>
  </g>

  <!-- String lights across mid -->
  <path d="M0 236 Q 100 262 200 240 T 400 244" stroke="#d8a13e" stroke-width="1.6" fill="none" opacity="0.9"/>
  <g fill="#ffe9a8">
    <circle cx="28" cy="243" r="2.6"/><circle cx="66" cy="250" r="2.6"/><circle cx="104" cy="252" r="2.6"/>
    <circle cx="142" cy="248" r="2.6"/><circle cx="180" cy="242" r="2.6"/><circle cx="218" cy="240" r="2.6"/>
    <circle cx="256" cy="244" r="2.6"/><circle cx="294" cy="248" r="2.6"/><circle cx="332" cy="247" r="2.6"/>
    <circle cx="370" cy="244" r="2.6"/>
  </g>

  <!-- Fairground floor -->
  <rect x="0" y="322" width="400" height="78" fill="url(#ground3)"/>

  <!-- Big top tent (bottom-centre landmark) -->
  <g transform="translate(232 322)">
    <path d="M-52 0 L-40 -54 L0 -70 L40 -54 L52 0 Z" fill="url(#tentA)"/>
    <path d="M-40 -54 L0 -70 L40 -54 L28 0 L-28 0 Z" fill="#f2e8d8" opacity="0.16"/>
    <path d="M-14 0 L0 -70 L14 0 Z" fill="#f6e3c4"/>
    <path d="M0 -70 L0 -84" stroke="#b03c33" stroke-width="2.4"/>
    <path d="M0 -84 L16 -78 L0 -72 Z" fill="#ffce54"/>
    <path d="M-14 0 L0 -18 L14 0 Z" fill="#5c231e"/>
  </g>

  <!-- Side tent (bottom-right) -->
  <g transform="translate(346 322)">
    <path d="M-34 0 L-24 -34 L24 -34 L34 0 Z" fill="url(#tentB)"/>
    <path d="M-24 -34 L0 -48 L24 -34 Z" fill="#8266e8"/>
    <path d="M-8 0 L0 -12 L8 0 Z" fill="#2a1a52"/>
    <path d="M0 -48 L0 -58 L12 -53 Z" fill="#7fd4c1"/>
  </g>

  <!-- Popcorn cart (bottom-left landmark) -->
  <g transform="translate(38 350)">
    <rect x="-16" y="-24" width="32" height="24" rx="2" fill="#f6e3c4"/>
    <rect x="-16" y="-24" width="32" height="24" fill="none" stroke="#c9503f" stroke-width="1.6"/>
    <path d="M-12 -24 v24 M-4 -24 v24 M4 -24 v24 M12 -24 v24" stroke="#e2574c" stroke-width="3"/>
    <path d="M-19 -24 L19 -24 L14 -34 L-14 -34 Z" fill="#e2574c"/>
    <circle cx="-10" cy="6" r="5" fill="#3a2244" stroke="#d8a13e" stroke-width="1.6"/>
    <circle cx="10" cy="6" r="5" fill="#3a2244" stroke="#d8a13e" stroke-width="1.6"/>
    <line x1="16" y1="-14" x2="30" y2="-8" stroke="#c9503f" stroke-width="2"/>
  </g>

  <!-- Crowd silhouettes -->
  <g fill="#160a1c">
    <circle cx="140" cy="352" r="5"/><rect x="135" y="356" width="10" height="16" rx="4"/>
    <circle cx="158" cy="356" r="4"/><rect x="154" y="359" width="8" height="13" rx="3.5"/>
    <circle cx="122" cy="356" r="4"/><rect x="118" y="359" width="8" height="13" rx="3.5"/>
  </g>
  <!-- One child holding a balloon -->
  <g>
    <circle cx="172" cy="360" r="3.4" fill="#160a1c"/>
    <rect x="169" y="362" width="7" height="10" rx="3" fill="#160a1c"/>
    <line x1="176" y1="362" x2="182" y2="346" stroke="#d8b48a" stroke-width="1"/>
    <ellipse cx="183" cy="341" rx="6" ry="7" fill="#e86ba7"/>
  </g>

  <!-- Banner flags (bottom edge accent) -->
  <path d="M0 388 Q 100 380 200 388 T 400 386" stroke="#d8a13e" stroke-width="1.2" fill="none" opacity="0.7"/>
  <g>
    <path d="M30 386 l5 8 l5 -8 z" fill="#e2574c"/>
    <path d="M90 383 l5 8 l5 -8 z" fill="#7fd4c1"/>
    <path d="M150 385 l5 8 l5 -8 z" fill="#ffce54"/>
    <path d="M240 386 l5 8 l5 -8 z" fill="#6a4ccf"/>
    <path d="M310 384 l5 8 l5 -8 z" fill="#e86ba7"/>
    <path d="M370 385 l5 8 l5 -8 z" fill="#e2574c"/>
  </g>
</svg>
