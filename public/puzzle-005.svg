<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="tSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#03040c"/>
      <stop offset="55%" stop-color="#0a0e24"/>
      <stop offset="82%" stop-color="#2c2144"/>
      <stop offset="100%" stop-color="#8a4a3a"/>
    </linearGradient>
    <radialGradient id="corona" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="28%" stop-color="#dfe8ff" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#b8c8f0" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#b8c8f0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tSea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#241a36"/>
      <stop offset="100%" stop-color="#0d0918"/>
    </linearGradient>
    <radialGradient id="ring" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff8e8" stop-opacity="1"/>
      <stop offset="100%" stop-color="#fff8e8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Sky: night at totality, sunset ring at every horizon -->
  <rect width="400" height="400" fill="url(#tSky)"/>

  <!-- Stars visible at midday -->
  <g fill="#dce8ff">
    <circle cx="30" cy="40" r="1.3"/><circle cx="86" cy="22" r="1"/><circle cx="142" cy="56" r="1.1"/>
    <circle cx="196" cy="20" r="1"/><circle cx="352" cy="26" r="1.2"/><circle cx="34" cy="120" r="1"/>
    <circle cx="98" cy="150" r="1.2"/><circle cx="368" cy="140" r="1"/><circle cx="330" cy="190" r="1.1"/>
  </g>
  <!-- Venus, bright (top-left landmark) -->
  <circle cx="66" cy="86" r="4" fill="#eef4ff"/>
  <circle cx="66" cy="86" r="9" fill="url(#ring)" opacity="0.5"/>

  <!-- The eclipsed sun (top-right quadrant) -->
  <g transform="translate(268 108)">
    <circle r="86" fill="url(#corona)"/>
    <!-- Corona streamers -->
    <g fill="#dfe8ff" opacity="0.5">
      <path d="M0 0 L-108 -34 L-64 -6 Z"/>
      <path d="M0 0 L104 -44 L60 -8 Z"/>
      <path d="M0 0 L-92 52 L-52 18 Z"/>
      <path d="M0 0 L96 58 L54 20 Z"/>
      <path d="M0 0 L-20 -104 L2 -58 Z"/>
      <path d="M0 0 L28 100 L4 56 Z"/>
    </g>
    <circle r="42" fill="#ffffff" opacity="0.9"/>
    <circle r="40" fill="#05060f"/>
    <!-- Diamond ring glint -->
    <circle cx="-27" cy="-31" r="7" fill="#fff8e8"/>
    <circle cx="-27" cy="-31" r="16" fill="url(#ring)"/>
    <g stroke="#fff8e8" stroke-width="1.6" stroke-linecap="round" opacity="0.9">
      <line x1="-27" y1="-52" x2="-27" y2="-40"/>
      <line x1="-48" y1="-31" x2="-36" y2="-31"/>
      <line x1="-41" y1="-45" x2="-33" y2="-37"/>
    </g>
  </g>

  <!-- Thin cloudbank catching twilight (left-middle landmark) -->
  <g fill="#5a4668" opacity="0.85">
    <ellipse cx="70" cy="196" rx="78" ry="10"/>
    <ellipse cx="120" cy="212" rx="56" ry="7" opacity="0.7"/>
  </g>
  <ellipse cx="70" cy="192" rx="78" ry="4" fill="#c9825e" opacity="0.5"/>

  <!-- Migrating birds, confused by the dark (mid landmark) -->
  <g stroke="#1c1428" stroke-width="2.2" fill="none" stroke-linecap="round">
    <path d="M160 168 q6 -7 12 0 q6 -7 12 0"/>
    <path d="M190 152 q5 -6 10 0 q5 -6 10 0"/>
    <path d="M142 146 q4 -5 8 0 q4 -5 8 0"/>
  </g>

  <!-- Sea with the 360-degree sunset shimmer -->
  <rect x="0" y="256" width="400" height="144" fill="url(#tSea)"/>
  <rect x="0" y="252" width="400" height="6" fill="#b45c3e" opacity="0.65"/>
  <g stroke-linecap="round">
    <line x1="30" y1="272" x2="72" y2="272" stroke="#b45c3e" stroke-width="2" opacity="0.4"/>
    <line x1="120" y1="284" x2="150" y2="284" stroke="#8a4a3a" stroke-width="1.6" opacity="0.35"/>
    <line x1="236" y1="270" x2="286" y2="270" stroke="#dfe8ff" stroke-width="2" opacity="0.3"/>
    <line x1="250" y1="282" x2="278" y2="282" stroke="#dfe8ff" stroke-width="1.4" opacity="0.2"/>
    <line x1="330" y1="276" x2="366" y2="276" stroke="#b45c3e" stroke-width="1.8" opacity="0.35"/>
  </g>

  <!-- Sea stack rocks (bottom-left landmark) -->
  <g fill="#120d1e">
    <path d="M28 322 L44 268 L62 322 Z"/>
    <path d="M64 322 L74 292 L86 322 Z"/>
  </g>

  <!-- Lighthouse silhouette (left landmark, beam off for totality) -->
  <g fill="#0e0a18">
    <rect x="105" y="270" width="12" height="52" rx="1"/>
    <rect x="102" y="264" width="18" height="8" rx="2"/>
    <circle cx="111" cy="260" r="4" fill="#dfe8ff" opacity="0.85"/>
  </g>

  <!-- Headland with watchers (bottom-right, the human moment) -->
  <path d="M180 400 L212 336 L268 318 L336 330 L400 314 L400 400 Z" fill="#0b0714"/>
  <g fill="#05030a">
    <!-- Watchers looking up, heads tilted -->
    <circle cx="242" cy="332" r="5"/><rect x="237" y="336" width="10" height="18" rx="4"/>
    <circle cx="262" cy="326" r="4.4"/><rect x="258" y="330" width="9" height="16" rx="4"/>
    <circle cx="282" cy="330" r="5"/><rect x="277" y="334" width="10" height="18" rx="4"/>
    <!-- One pointing at the sky -->
    <circle cx="306" cy="330" r="4.6"/><rect x="302" y="334" width="9" height="17" rx="4"/>
    <line x1="308" y1="338" x2="322" y2="322" stroke="#05030a" stroke-width="3.4" stroke-linecap="round"/>
    <!-- Child on shoulders -->
    <circle cx="352" cy="316" r="4"/><rect x="348" y="320" width="8" height="12" rx="3.5"/>
    <circle cx="352" cy="336" r="5"/><rect x="347" y="340" width="10" height="16" rx="4"/>
  </g>
  <!-- Telescope on tripod (bottom-right landmark) -->
  <g stroke="#05030a" stroke-width="3.6" stroke-linecap="round">
    <line x1="204" y1="352" x2="228" y2="330"/>
    <line x1="216" y1="341" x2="204" y2="368"/>
    <line x1="216" y1="341" x2="228" y2="368"/>
    <line x1="216" y1="341" x2="216" y2="366"/>
  </g>
  <rect x="220" y="322" width="20" height="8" rx="3" transform="rotate(-42 230 326)" fill="#05030a"/>

  <!-- Eclipse glasses glint on a watcher -->
  <rect x="238" y="330" width="9" height="3" rx="1.5" fill="#dfe8ff" opacity="0.9"/>
  <rect x="278" y="328" width="9" height="3" rx="1.5" fill="#dfe8ff" opacity="0.9"/>
</svg>
